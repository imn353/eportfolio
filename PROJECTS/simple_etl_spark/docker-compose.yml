services:
  spark:
    build: .
    ports:
      - "8888:8888"   # Jupyter Lab
      - "4040:4040"   # Spark Web UI
    volumes:
      - ./notebooks:/home/jovyan/work
      - ./data:/home/jovyan/data
      - .:/home/jovyan/project
    environment:
      - JUPYTER_ENABLE_LAB=yes
    depends_on:
      - postgres

  postgres:
    build: ./postgres
    environment:
      POSTGRES_USER: censo
      POSTGRES_PASSWORD: "123"
    ports:
      - "5432:5432"
    volumes:
      - ./postgres/data:/var/lib/postgresql/data

  adminer:
    image: adminer
    ports:
      - "8080:8080"
    depends_on:
      - postgres

  metabase:
    image: metabase/metabase:latest
    container_name: metabase-censo
    ports:
      - "3000:3000"
    environment:
      MB_DB_TYPE: postgres
      MB_DB_HOST: postgres
      MB_DB_PORT: 5432
      MB_DB_USER: censo
      MB_DB_PASS: "123"
      MB_DB_DBNAME: metabase
    depends_on:
      - postgres
